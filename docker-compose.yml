# workagent — Mattermost + (hermes-agent | openclaw) 통합 스택
#
# 운영 규범: .agents/AGENTS.md
# - 데이터 볼륨은 ./volumes/ 바인드 마운트 (커밋 금지)
# - 시크릿은 .env (커밋 금지). 키 카탈로그는 .env.example
# - 기동: docker compose up -d   /   상태: docker compose ps
# - 절대 금지: docker compose down -v  (DB·업로드 손실)
#
# 에이전트 토글: .env 의 COMPOSE_PROFILES 로 선택
#   COMPOSE_PROFILES=hermes    → hermes-agent 만 기동
#   COMPOSE_PROFILES=openclaw  → openclaw 만 기동
#   COMPOSE_PROFILES=hermes,openclaw → 둘 다 (각자 별도 봇 토큰 필요)

services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-15-alpine}
    container_name: workagent-postgres
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    environment:
      TZ: ${TZ:-Asia/Seoul}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mattermost:
    depends_on:
      postgres:
        condition: service_healthy
    image: mattermost/${MATTERMOST_IMAGE:-mattermost-team-edition}:${MATTERMOST_IMAGE_TAG:-10.5}
    container_name: workagent-mattermost
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
    ports:
      - "${MATTERMOST_PORT:-8065}:8065"
    volumes:
      - ./volumes/mattermost/config:/mattermost/config:rw
      - ./volumes/mattermost/data:/mattermost/data:rw
      - ./volumes/mattermost/logs:/mattermost/logs:rw
      - ./volumes/mattermost/plugins:/mattermost/plugins:rw
      - ./volumes/mattermost/client-plugins:/mattermost/client/plugins:rw
      - ./volumes/mattermost/bleve-indexes:/mattermost/bleve-indexes:rw
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable&connect_timeout=10"
      MM_BLEVESETTINGS_INDEXDIR: /mattermost/bleve-indexes
      MM_SERVICESETTINGS_SITEURL: ${MM_SERVICESETTINGS_SITEURL:-http://localhost:8065}
      # ── 로컬라이제이션: 기본 한국어 ──────────────────────────
      MM_LOCALIZATIONSETTINGS_DEFAULTSERVERLOCALE: ${MM_DEFAULT_LOCALE:-ko}
      MM_LOCALIZATIONSETTINGS_DEFAULTCLIENTLOCALE: ${MM_DEFAULT_LOCALE:-ko}
      MM_LOCALIZATIONSETTINGS_AVAILABLELOCALES: ${MM_AVAILABLE_LOCALES:-}
      # ── 플러그인: Calls 비활성화 ────────────────────────────
      # PluginStates 는 JSON. 여러 플러그인을 한 번에 명시한다.
      MM_PLUGINSETTINGS_PLUGINSTATES: '{"com.mattermost.calls":{"Enable":false}}'
      # ── 커스텀 브랜딩 ─────────────────────────────────────
      # 활성화하면 로그인 화면에 사이트명·브랜드 텍스트·로고 이미지가 노출된다.
      # 로고 이미지 자체는 환경변수로 주입 불가 → 최초 로그인 후 System Console 에서 업로드
      # 또는 volumes/mattermost/data/brand/image.png 에 파일을 직접 배치 (init-volumes.sh 가 자동 복사)
      MM_TEAMSETTINGS_ENABLECUSTOMBRAND: "true"
      MM_TEAMSETTINGS_SITENAME: ${MM_SITE_NAME:-workagent}
      MM_TEAMSETTINGS_CUSTOMBRANDTEXT: ${MM_CUSTOM_BRAND_TEXT:-}
      MM_TEAMSETTINGS_CUSTOMDESCRIPTIONTEXT: ${MM_CUSTOM_DESCRIPTION_TEXT:-}
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8065/api/v4/system/ping || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  hermes-agent:
    profiles: [ "hermes" ]
    depends_on:
      mattermost:
        condition: service_healthy
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-latest}
    container_name: workagent-hermes-agent
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
    # 공식 이미지의 영속 볼륨: /opt/data ← ~/.hermes (config.yaml, .env, sessions, memories, skills, logs)
    volumes:
      - ./volumes/hermes:/opt/data
    # 게이트웨이 API/대시보드 포트는 기본적으로 외부에 노출하지 않는다.
    # 필요하면 docker-compose.override.yml 에서 ports 를 추가.
    # ports:
    #   - "${HERMES_GATEWAY_PORT:-8642}:8642"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      # ── LLM: OpenRouter ──────────────────────────────────────
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-openrouter}
      HERMES_INFERENCE_MODEL: ${HERMES_INFERENCE_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      # ── Mattermost 어댑터 (컨테이너 네트워크 내부에서 서비스명으로 접근) ──
      MATTERMOST_URL: ${MATTERMOST_URL:-http://mattermost:8065}
      MATTERMOST_TOKEN: ${MATTERMOST_TOKEN}
      MATTERMOST_ALLOWED_USERS: ${MATTERMOST_ALLOWED_USERS}
      MATTERMOST_REPLY_MODE: ${MATTERMOST_REPLY_MODE:-thread}
      MATTERMOST_REQUIRE_MENTION: ${MATTERMOST_REQUIRE_MENTION:-true}
      MATTERMOST_HOME_CHANNEL: ${MATTERMOST_HOME_CHANNEL:-}
      MATTERMOST_ALLOWED_CHANNELS: ${MATTERMOST_ALLOWED_CHANNELS:-}
      MATTERMOST_FREE_RESPONSE_CHANNELS: ${MATTERMOST_FREE_RESPONSE_CHANNELS:-}
    command: [ "gateway", "run" ]

  openclaw:
    profiles: [ "openclaw" ]
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_IMAGE_TAG:-latest}
    container_name: workagent-openclaw
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
    # 공식 이미지의 데이터 디렉터리: /home/node/.openclaw
    #   (auth 캐시·세션·상태 보존). config.json 은 그 안에 ro 로 별도 마운트.
    volumes:
      - ./volumes/openclaw:/home/node/.openclaw
      - ./config/openclaw/config.json:/home/node/.openclaw/config.json:ro
    # Control UI 는 기본적으로 외부 노출하지 않음.
    # 필요하면 docker-compose.override.yml 에서 18789 포트를 노출한다.
    # ports:
    #   - "${OPENCLAW_UI_PORT:-18789}:18789"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      # Docker bridge 환경에서 mDNS(bonjour) 비활성
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      # ── LLM: OpenRouter ─────────────────────────────────────
      # 모델/베이스URL 은 config/openclaw/config.json 의 agents.defaults.model 에서 관리
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # ── Mattermost 어댑터 ───────────────────────────────────
      # OpenClaw 의 default 계정은 env 두 개로만 설정된다.
      # 나머지(replyToMode/chatmode/groups 등)는 config 파일에서 관리.
      MATTERMOST_URL: ${MATTERMOST_URL:-http://mattermost:8065}
      MATTERMOST_BOT_TOKEN: ${MATTERMOST_TOKEN}

networks:
  stack:
    name: workagent-stack
    driver: bridge
