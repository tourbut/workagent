# workagent — Mattermost + (hermes-agent | openclaw) 통합 스택 (Podman 호환 버전)
#
# 운영 규범: .agents/AGENTS.md
# - 데이터 볼륨은 ./volumes/ 바인드 마운트 (커밋 금지)
# - 시크릿은 .env (커밋 금지). 키 카탈로그는 .env.example
# - 기동: podman compose up -d   /   상태: podman compose ps
# - 절대 금지: podman compose down -v  (DB·업로드 손실)
#
# Podman 전용 변경사항:
# 1. Rootless Podman 권한 제어: 볼륨 바인드 마운트 경로 끝에 ':U' 플래그를 추가하여 Podman이 컨테이너 내부의
#    적절한 UID/GID(postgres: 999, mattermost: 2000)에 맞게 호스트 디렉터리 권한을 자동으로 chown 매핑하도록 지정합니다.
# 2. SELinux 및 보안 강화: 마운트 경로에 ':z' 플래그를 추가하여 SELinux 레이블링 처리를 안전하게 동기화합니다 (macOS에서는 무시되지만 호환성 유지).
# 3. 읽기 전용 볼륨 마운트에 'ro,z' 명시
#
# 에이전트 토글: .env 의 COMPOSE_PROFILES 로 선택
#   COMPOSE_PROFILES=hermes    → hermes-agent 만 기동
#   COMPOSE_PROFILES=openclaw  → openclaw 만 기동
#   COMPOSE_PROFILES=hermes,openclaw → 둘 다 (각자 별도 봇 토큰 필요)

services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-15-alpine}
    container_name: workagent-postgres
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data:U,z
    environment:
      TZ: ${TZ:-Asia/Seoul}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mattermost:
    depends_on:
      postgres:
        condition: service_healthy
    image: mattermost/${MATTERMOST_IMAGE:-mattermost-team-edition}:${MATTERMOST_IMAGE_TAG:-10.5}
    container_name: workagent-mattermost
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    # openclaw 의 SSRF 보호가 .localhost 접미사를 loopback 으로 자동 처리
    # → openclaw 가 http://mattermost.localhost:8065 으로 붙도록 alias 부여.
    networks:
      stack:
        aliases:
          - mattermost.localhost
    ports:
      - "${MATTERMOST_PORT:-8065}:8065"
    volumes:
      - ./volumes/mattermost/config:/mattermost/config:rw,U,z
      - ./volumes/mattermost/data:/mattermost/data:rw,U,z
      - ./volumes/mattermost/logs:/mattermost/logs:rw,U,z
      - ./volumes/mattermost/plugins:/mattermost/plugins:rw,U,z
      - ./volumes/mattermost/client-plugins:/mattermost/client/plugins:rw,U,z
      - ./volumes/mattermost/bleve-indexes:/mattermost/bleve-indexes:rw,U,z
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable&connect_timeout=10"
      MM_BLEVESETTINGS_INDEXDIR: /mattermost/bleve-indexes
      MM_SERVICESETTINGS_SITEURL: ${MM_SERVICESETTINGS_SITEURL:-http://localhost:8065}
      # ── 로컬라이제이션: 기본 한국어 ──────────────────────────
      MM_LOCALIZATIONSETTINGS_DEFAULTSERVERLOCALE: ${MM_DEFAULT_LOCALE:-ko}
      MM_LOCALIZATIONSETTINGS_DEFAULTCLIENTLOCALE: ${MM_DEFAULT_LOCALE:-ko}
      MM_LOCALIZATIONSETTINGS_AVAILABLELOCALES: ${MM_AVAILABLE_LOCALES:-}
      # ── 플러그인: Calls 비활성화 ────────────────────────────
      # PluginStates 는 JSON. 여러 플러그인을 한 번에 명시한다.
      MM_PLUGINSETTINGS_PLUGINSTATES: '{"com.mattermost.calls":{"Enable":false}}'
      # ── 커스텀 브랜딩 ─────────────────────────────────────
      # 활성화하면 로그인 화면에 사이트명·브랜드 텍스트·로고 이미지가 노출된다.
      # 로고 이미지 자체는 환경변수로 주입 불가 → 최초 로그인 후 System Console 에서 업로드
      # 또는 volumes/mattermost/data/brand/image.png 에 파일을 직접 배치 (init-volumes.sh 가 자동 복사)
      MM_TEAMSETTINGS_ENABLECUSTOMBRAND: "true"
      MM_TEAMSETTINGS_SITENAME: ${MM_SITE_NAME:-workagent}
      MM_TEAMSETTINGS_CUSTOMBRANDTEXT: ${MM_CUSTOM_BRAND_TEXT:-}
      MM_TEAMSETTINGS_CUSTOMDESCRIPTIONTEXT: ${MM_CUSTOM_DESCRIPTION_TEXT:-}
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8065/api/v4/system/ping || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  hermes-agent:
    profiles: [ "hermes" ]
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-latest}
    container_name: workagent-hermes-agent
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
    # 공식 이미지의 영속 볼륨: /opt/data ← ~/.hermes (config.yaml, .env, sessions, memories, skills, logs)
    volumes:
      - ./volumes/hermes:/opt/data:U,z
      - ./config/hermes/memory_tool.py:/opt/hermes/tools/memory_tool.py:ro,z
      #- ./config/hermes/sslnhimc.cer:/etc/ssl/certs/sslnhimc.cer:ro,z
      #- ./config/hermes/httpx_config.py:/opt/hermes/.venv/lib/python3.13/site-packages/httpx/_config.py:ro,z
      #- ./config/hermes/httpcore_anyio.py:/opt/hermes/.venv/lib/python3.13/site-packages/httpcore/backends/anyio.py:ro,z
      #- ./config/hermes/httpcore_sync.py:/opt/hermes/.venv/lib/python3.13/site-packages/httpcore/backends/sync.py:ro,z
      #- ./config/hermes/urllib3_ssl_.py:/opt/hermes/.venv/lib/python3.13/site-packages/urllib3/util/ssl_.py:ro,z
    # 게이트웨이 API/대시보드 포트는 기본적으로 외부에 노출하지 않는다.
    # 필요하면 docker-compose.override.yml 에서 ports 를 추가.
    # ports:
    #   - "${HERMES_GATEWAY_PORT:-8642}:8642"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      # ── SSL CA Certificates ──────────────────────────────────
      #SSL_CERT_FILE: /etc/ssl/certs/sslnhimc.cer
      #REQUESTS_CA_BUNDLE: /etc/ssl/certs/sslnhimc.cer
      #CURL_CA_BUNDLE: /etc/ssl/certs/sslnhimc.cer
      # ── Python Warnings Suppression ─────────────────────────
      PYTHONWARNINGS: "ignore:Unverified HTTPS request"
      # ── LLM: OpenRouter ──────────────────────────────────────
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-openrouter}
      HERMES_INFERENCE_MODEL: ${HERMES_INFERENCE_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      # ── Mattermost 어댑터 (컨테이너 네트워크 내부에서 서비스명으로 접근) ──
      MATTERMOST_URL: ${MATTERMOST_URL:-http://mattermost:8065}
      MATTERMOST_TOKEN: ${MATTERMOST_TOKEN}
      MATTERMOST_ALLOWED_USERS: ${MATTERMOST_ALLOWED_USERS}
      GATEWAY_ALLOW_ALL_USERS: ${GATEWAY_ALLOW_ALL_USERS:-false}
      MATTERMOST_REPLY_MODE: ${MATTERMOST_REPLY_MODE:-thread}
      MATTERMOST_REQUIRE_MENTION: ${MATTERMOST_REQUIRE_MENTION:-true}
      MATTERMOST_HOME_CHANNEL: ${MATTERMOST_HOME_CHANNEL:-}
      MATTERMOST_ALLOWED_CHANNELS: ${MATTERMOST_ALLOWED_CHANNELS:-}
      MATTERMOST_FREE_RESPONSE_CHANNELS: ${MATTERMOST_FREE_RESPONSE_CHANNELS:-}
    command: [ "gateway", "run" ]

  openclaw:
    profiles: [ "openclaw" ]
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_IMAGE_TAG:-latest}
    container_name: workagent-openclaw
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - stack
    # 공식 이미지의 데이터 디렉터리: /home/node/.openclaw
    #   (auth 캐시·세션·상태 보존). 설정 파일명은 공식 표준인 openclaw.json (config.json 아님).
    volumes:
      - ./volumes/openclaw:/home/node/.openclaw:U,z
      - ./config/openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro,z
    # Control UI 는 기본적으로 외부 노출하지 않음.
    # 필요하면 docker-compose.override.yml 에서 18789 포트를 노출한다.
    # ports:
    #   - "${OPENCLAW_UI_PORT:-18789}:18789"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      # ── 경로 ───────────────────────────────────────────────
      # 공식 docker 예제 표준. state 디렉터리·config 파일 위치를 명시.
      HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      # Docker bridge 환경에서 mDNS(bonjour) 비활성
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      # 컨테이너 환경에서는 gateway bind=auto 강제 → 토큰 필수
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      # SSRF 우회 (break-glass) — 사설 망의 self-hosted Mattermost 접근을 위해.
      # OpenClaw 의 SSRF 보호가 docker 내부 hostname 의 사설 IP 를 차단하므로 필요.
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
      # ── LLM: OpenRouter ─────────────────────────────────────
      # 모델/베이스URL 은 config/openclaw/openclaw.json 의 agents.defaults.model 에서 관리
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # ── Mattermost 어댑터 ───────────────────────────────────
      # OpenClaw 의 default 계정은 env 두 개로만 설정된다.
      # 나머지(replyToMode/chatmode/groups 등)는 config 파일에서 관리.
      MATTERMOST_URL: ${MATTERMOST_URL:-http://mattermost:8065}
      MATTERMOST_BOT_TOKEN: ${MATTERMOST_TOKEN}

networks:
  stack:
    name: workagent-stack
    driver: bridge
